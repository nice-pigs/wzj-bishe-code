<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>座位检测系统 - 实时监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .config-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .config-panel h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .input-group input {
            flex: 1;
            min-width: 200px;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .input-group button {
            padding: 10px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .input-group button:hover {
            transform: translateY(-2px);
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .status-card {
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .status-card.occupied {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .status-card.vacant {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        
        .status-card.offline {
            background: linear-gradient(135deg, #bdc3c7 0%, #95a5a6 100%);
            color: white;
        }
        
        .status-icon {
            font-size: 100px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .status-text {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .status-duration {
            font-size: 20px;
            opacity: 0.9;
        }
        
        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        
        .sensor-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s;
        }
        
        .sensor-item:hover {
            transform: translateY(-5px);
        }
        
        .sensor-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .sensor-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .sensor-label {
            font-size: 14px;
            color: #666;
        }
        
        .info-card h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #666;
            font-size: 14px;
        }
        
        .info-value {
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }
        
        .update-time {
            text-align: center;
            color: white;
            font-size: 14px;
            margin-top: 20px;
            opacity: 0.9;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-indicator.online {
            background: #4caf50;
            box-shadow: 0 0 10px #4caf50;
        }
        
        .status-indicator.offline {
            background: #f44336;
        }
        
        .alert {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🪑 座位检测系统</h1>
        <p>基于STM32 + ESP32的物联网座位状态监控系统</p>
    </div>
    
    <div class="container">
        <!-- 警告提示 -->
        <div class="alert" id="alert">
            <strong>⚠️ 提示：</strong> <span id="alertMessage"></span>
        </div>
        
        <!-- 主要内容区 -->
        <div class="main-grid">
            <!-- 座位状态卡片 -->
            <div class="card status-card" id="statusCard">
                <div class="status-icon" id="statusIcon">⏳</div>
                <div class="status-text" id="statusText">连接中...</div>
                <div class="status-duration" id="statusDuration">等待数据</div>
            </div>
            
            <!-- 传感器数据卡片 -->
            <div class="card">
                <h3>📊 传感器数据</h3>
                <div class="sensor-grid">
                    <div class="sensor-item">
                        <div class="sensor-icon">🌡️</div>
                        <div class="sensor-value" id="temperature">--</div>
                        <div class="sensor-label">温度 (°C)</div>
                    </div>
                    <div class="sensor-item">
                        <div class="sensor-icon">💧</div>
                        <div class="sensor-value" id="humidity">--</div>
                        <div class="sensor-label">湿度 (%)</div>
                    </div>
                    <div class="sensor-item">
                        <div class="sensor-icon">💡</div>
                        <div class="sensor-value" id="lightLevel">--</div>
                        <div class="sensor-label">光照 (%)</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 系统信息卡片 -->
        <div class="card info-card">
            <h3>ℹ️ 系统信息</h3>
            <div class="info-item">
                <span class="info-label">连接状态</span>
                <span class="info-value">
                    <span class="status-indicator" id="connectionIndicator"></span>
                    <span id="connectionStatus">未连接</span>
                </span>
            </div>
            <div class="info-item">
                <span class="info-label">设备IP</span>
                <span class="info-value" id="deviceIP">--</span>
            </div>
            <div class="info-item">
                <span class="info-label">WiFi信号</span>
                <span class="info-value" id="wifiSignal">--</span>
            </div>
            <div class="info-item">
                <span class="info-label">设备运行时间</span>
                <span class="info-value" id="uptime">--</span>
            </div>
            <div class="info-item">
                <span class="info-label">最后更新</span>
                <span class="info-value" id="lastUpdate">--</span>
            </div>
        </div>
        
        <div class="update-time" id="updateTime">
            系统就绪，等待连接设备...
        </div>
    </div>
    
    <script>
        // 服务器配置
        const SERVER_URL = 'http://localhost:3000';  // 本地服务器地址
        
        let updateInterval = null;
        let isConnected = false;
        
        // 页面加载时自动连接
        window.onload = function() {
            connectServer();
        };
        
        // 连接服务器
        function connectServer() {
            showAlert('正在连接服务器...', 'info');
            
            fetch(`${SERVER_URL}/api/health`)
                .then(response => response.json())
                .then(data => {
                    isConnected = true;
                    updateConnectionStatus(true);
                    showAlert('服务器连接成功！', 'success');
                    
                    // 开始定时更新
                    if (updateInterval) clearInterval(updateInterval);
                    updateStatus();
                    updateSystemInfo();
                    updateInterval = setInterval(() => {
                        updateStatus();
                        updateSystemInfo();
                    }, 2000);
                })
                .catch(error => {
                    isConnected = false;
                    updateConnectionStatus(false);
                    showAlert('服务器连接失败，请确保服务器已启动', 'error');
                    console.error('Connection error:', error);
                    
                    // 5秒后重试
                    setTimeout(connectServer, 5000);
                });
        }
        
        // 更新座位状态
        function updateStatus() {
            fetch(`${SERVER_URL}/api/seat/status`)
                .then(response => response.json())
                .then(result => {
                    if (!result.success) {
                        throw new Error('获取数据失败');
                    }
                    
                    const data = result.data;
                    updateConnectionStatus(true);
                    
                    const card = document.getElementById('statusCard');
                    const icon = document.getElementById('statusIcon');
                    const text = document.getElementById('statusText');
                    const duration = document.getElementById('statusDuration');
                    
                    if (!data.deviceOnline) {
                        card.className = 'card status-card offline';
                        icon.textContent = '⚠️';
                        text.textContent = '设备离线';
                        duration.textContent = 'STM32未连接';
                    } else if (data.occupied) {
                        card.className = 'card status-card occupied';
                        icon.textContent = '🔴';
                        text.textContent = '占用中';
                        duration.textContent = '持续时间: ' + formatDuration(data.duration);
                    } else {
                        card.className = 'card status-card vacant';
                        icon.textContent = '🟢';
                        text.textContent = '空闲';
                        duration.textContent = '空闲时间: ' + formatDuration(data.duration);
                    }
                    
                    // 更新传感器数据
                    document.getElementById('temperature').textContent = data.temperature;
                    document.getElementById('humidity').textContent = data.humidity;
                    document.getElementById('lightLevel').textContent = data.lightLevel;
                    
                    // 更新时间
                    const updateTime = new Date(data.lastUpdate);
                    document.getElementById('lastUpdate').textContent = updateTime.toLocaleTimeString('zh-CN');
                    document.getElementById('updateTime').textContent = 
                        '最后更新: ' + updateTime.toLocaleString('zh-CN');
                })
                .catch(error => {
                    updateConnectionStatus(false);
                    console.error('Update error:', error);
                });
        }
        
        // 更新系统信息
        function updateSystemInfo() {
            fetch(`${SERVER_URL}/api/device/info`)
                .then(response => response.json())
                .then(result => {
                    if (result.success) {
                        const data = result.data;
                        document.getElementById('deviceIP').textContent = data.deviceId;
                        document.getElementById('uptime').textContent = formatDuration(Math.floor(data.uptime));
                    }
                })
                .catch(error => {
                    console.error('System info error:', error);
                });
            
            // 获取统计信息
            fetch(`${SERVER_URL}/api/seat/statistics`)
                .then(response => response.json())
                .then(result => {
                    if (result.success) {
                        const data = result.data;
                        document.getElementById('wifiSignal').textContent = 
                            `今日占用${data.todayOccupiedCount}次`;
                    }
                })
                .catch(error => {
                    console.error('Statistics error:', error);
                });
        }
        
        // 更新连接状态
        function updateConnectionStatus(connected) {
            const indicator = document.getElementById('connectionIndicator');
            const status = document.getElementById('connectionStatus');
            
            if (connected) {
                indicator.className = 'status-indicator online';
                status.textContent = '已连接';
                isConnected = true;
            } else {
                indicator.className = 'status-indicator offline';
                status.textContent = '未连接';
                isConnected = false;
            }
        }
        
        // 显示提示
        function showAlert(message, type = 'warning') {
            const alert = document.getElementById('alert');
            const alertMessage = document.getElementById('alertMessage');
            
            alertMessage.textContent = message;
            alert.className = 'alert show';
            
            if (type === 'success') {
                alert.style.background = '#d4edda';
                alert.style.borderColor = '#28a745';
            } else if (type === 'error') {
                alert.style.background = '#f8d7da';
                alert.style.borderColor = '#dc3545';
            } else if (type === 'info') {
                alert.style.background = '#d1ecf1';
                alert.style.borderColor = '#17a2b8';
            } else {
                alert.style.background = '#fff3cd';
                alert.style.borderColor = '#ffc107';
            }
            
            setTimeout(() => {
                alert.className = 'alert';
            }, 3000);
        }
        
        // 格式化时长
        function formatDuration(seconds) {
            if (seconds < 60) return seconds + '秒';
            if (seconds < 3600) return Math.floor(seconds / 60) + '分钟';
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            return hours + '小时' + minutes + '分钟';
        }
    </script>
</body>
</html>
